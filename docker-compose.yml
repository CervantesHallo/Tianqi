# Tianqi docker-compose — Phase 10 / Step 4 (per ADR-0003 Step 4 裁决 6 α)
#
# Single-service orchestration scoped to the Tianqi container itself.
# Reasoning: Tianqi's runtime infrastructure dependencies (postgres for
# event-store-postgres / saga-state-store-postgres / dead-letter-store-
# postgres / kafka for notification-kafka) are KI-P8-002 territory — real
# infrastructure binding is Phase 11 responsibility, not Step 4 scope.
# Adding postgres/kafka services here would either (a) duplicate KI-P8-002
# scope or (b) ship a half-baked dev environment. Keep this file minimal
# and let Phase 11 extend with real-infra services.
#
# Value provided: a one-liner wrapper for "build + run inside the project
# container" that contributors can use without learning docker run flags.
# Examples:
#   docker compose build           # build the runtime image
#   docker compose up -d           # start container in background
#   docker compose run --rm tianqi pnpm test
#   docker compose run --rm tianqi pnpm build

services:
  tianqi:
    build:
      context: .
      target: runtime
    image: tianqi:dev
    container_name: tianqi-dev
    # Use the Dockerfile's HEALTHCHECK as-is (per Step 4 裁决 5 B).
    # Default CMD keeps the container alive; override for one-off tasks via
    # `docker compose run --rm tianqi <cmd>`.
